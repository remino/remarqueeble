<!doctype html>
<html>
	<head>
		<title>Marquee Demo</title>
		<style type="text/css">
			marquee {
				border: solid 2px black;
			}
		</style>
	</head>
	<body>
		<h1>Marquee Demo</h1>

		<h2>Scroll</h2>
		<marquee behavior="scroll">SCROLL</marquee>

		<h2>Slide</h2>
		<marquee behavior="slide" loop="2" hspace="20">SLIDE</marquee>

		<h2>Alternate</h2>
		<marquee behavior="alternate" loop="3">ALTERNATE</marquee>
	</body>
</html>
